---
layout: default
---

<div class="post">
  <div class="post-thumbnail">
    <img src="{{ page.artCropped }}">
  </div>

  <div class="post-content">
    <p>
      <b>{{ page.title }}</b><br>
      {{ page.date | date:"%Y-%m-%d" }}
    </p>

    <p>
      <a href="{{ page.mp3 }}">[download / play]</a>
    </p>

    <hr class="little">

    {{ content }}
  </div>
</div>
